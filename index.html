<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Día de la Mujer - Yuly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --rosa: #e91e63;
      --rosa-claro: #f8bbd9;
      --dorado: #d4af37;
      --blanco: #fffef9;
      --violeta: #7b1fa2;
    }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #4a1942 60%, #1a0a2e 100%);
      min-height: 100vh;
      color: var(--blanco);
      overflow-x: hidden;
    }
    .flores-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.15;
      background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=1920') center/cover;
      z-index: 0;
    }
    .contenedor {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    header {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--blanco);
      text-shadow: 0 0 30px rgba(233, 30, 99, 0.5);
      letter-spacing: 0.02em;
      line-height: 1.3;
      animation: titulo 2s ease-out;
    }
    @keyframes titulo {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .subtitulo {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: var(--rosa-claro);
      font-weight: 500;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
      margin: 2.5rem 0;
    }
    .galeria img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .galeria img:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 32px rgba(233, 30, 99, 0.3);
    }
    .seccion {
      margin: 2.5rem 0;
    }
    .seccion h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--dorado);
      margin-bottom: 1rem;
      text-align: center;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .mensaje {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid rgba(212, 175, 55, 0.3);
      text-align: center;
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .audio-box {
      background: rgba(123, 31, 162, 0.25);
      border-radius: 16px;
      padding: 1.25rem;
      margin: 2rem 0;
      text-align: center;
      border: 1px solid rgba(233, 30, 99, 0.4);
    }
    .audio-box p {
      margin-bottom: 0.75rem;
      color: var(--rosa-claro);
      font-weight: 600;
    }
    audio {
      width: 100%;
      max-width: 320px;
      height: 48px;
    }
    footer {
      text-align: center;
      padding: 2rem 0 1rem;
      color: var(--rosa-claro);
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="flores-bg" aria-hidden="true"></div>
  <div class="contenedor">
    <header>
      <h1>FELIZ DÍA DE LA MUJER YULY</h1>
      <p class="subtitulo">Con cariño, en tu día</p>
    </header>

    <section class="galeria" aria-label="Galería de imágenes">
      <img src="foto1.jpg" alt="Celebración y alegría">
      <img src="foto2.jpg" alt="Mujer feliz">
      <img src="foto3.jpg" alt="Día especial">
    </section>

    <section class="seccion">
      <h2>Un video para ti</h2>
      <div class="video-wrapper">
        <iframe src="Video1.mp4" title="Video para el Día de la Mujer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </section>

    <div class="mensaje">
      Yuly, que este día esté lleno de alegría, reconocimiento y todo el amor que mereces. ¡Eres increíble!
    </div>

    <section class="audio-box">
      <p>🎵 Audio de amor de fondo</p>
      <audio id="audio-amor" controls loop preload="auto">
        <source src="musica-amor-yuli.mp3" type="audio/mpeg">
        <source src="audio-amor.ogg" type="audio/ogg">
        Tu navegador no soporta audio. Añade el archivo <strong>audio-amor.mp3</strong> en esta carpeta.
      </audio>
    </section>

    <footer>
      Feliz Día Internacional de la Mujer · Con amor
    </footer>
  </div>
  <script>
    var audio = document.getElementById('audio-amor');
    if (audio) {
      audio.volume = 0.4;
      document.addEventListener('click', function playOnce() {
        audio.play().catch(function(){});
        document.removeEventListener('click', playOnce);
      }, { once: true });
    }
  </script>
</body>
</html>
